gpu_configs:
  dram_bw: 600 # GB/s, 80GB SXM
  dram_freq: 6251 # MHz (check with nvidia-smi -q -d CLOCK)
  cuda_fp32_flops: 31.2 # TFLOPs, CUDA
  tc_bf16_flops: 125 # TFLOPs, TensorCore
  tc_fp16_flops: 125 # TFLOPs, TensorCore
