  num_sm: 72
  dram_size: 24 # GB
  power_cap: 150 # W
  l2_size: 6 # MB
  l2_bw: 5120 # Bytes/cycle (check Whitepaper)
  xu_bw_per_sm: 16 # 16 instructions per cycle throughput per SM